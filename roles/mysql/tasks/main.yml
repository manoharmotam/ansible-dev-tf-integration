---
# tasks file for mysql
  - name: Installing mysql-server
    package: 
      name: mysql-server
      state: present
  - name: Install boto3 and boto3 core dependencies
    pip:
      name:
      - boto3
      - botocore
      executable: pip3.9
  - name: Enabling and restart services
    service:
      name: mysqld
      state: started
      enabled: yes
  - name: setting up the root user
    command: mysql_secure_installation --set-root-pass "{{ MYSQL_PASSWORD }}"